<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>oncehuman動物繁殖タイマー</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#100804;
  color:#fff4dc;
  min-height:100vh;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,rgba(120,60,20,.2),rgba(0,0,0,.95));
  z-index:-2;
}
.app{
  max-width:860px;
  margin:auto;
  padding:24px 12px 80px;
}
h1{
  text-align:center;
  color:#ffd27a;
  font-size:40px;
  margin:8px 0 4px;
  line-height:1.15;
  text-shadow:0 0 20px rgba(255,170,60,.85);
}
h1 span{display:block}
.sub{
  text-align:center;
  color:#fff0d0;
  font-weight:900;
  margin:18px 0;
  font-size:18px;
}
.line{
  height:1px;
  background:linear-gradient(90deg,transparent,#d78b32,transparent);
  margin:12px 20px;
}
.area{
  position:relative;
  overflow:hidden;
  border:1px solid #d98b25;
  border-radius:18px;
  padding:18px;
  margin:14px 0;
  background:#130804;
  box-shadow:0 0 22px rgba(255,145,35,.18);
}
.area:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,rgba(10,4,2,.30),rgba(10,4,2,.42),rgba(10,4,2,.88)),
    var(--bg) center/cover no-repeat;
  opacity:.82;
  z-index:0;
}
.area>*{position:relative;z-index:1}
.row{
  display:grid;
  grid-template-columns:1.1fr 1fr;
  gap:24px;
  align-items:start;
}
.badges{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}
.place{
  border:1px solid #ffd28a;
  border-radius:12px;
  padding:8px 16px;
  font-weight:900;
  font-size:20px;
  background:rgba(80,40,12,.5);
}
.status{
  border:1px solid #ff5a4c;
  background:#9b201c;
  border-radius:999px;
  padding:8px 16px;
  font-weight:900;
  font-size:20px;
}
.status.active{
  background:#a56313;
  border-color:#ffd27a;
}
.status.ready{
  background:#2f7d38;
  border-color:#95ff9a;
}
label.title{
  display:block;
  color:#ffd27a;
  font-weight:900;
  margin:10px 0 6px;
}
input,select,button{
  width:100%;
  font-size:16px;
  border-radius:10px;
  padding:12px;
  border:1px solid rgba(255,205,135,.7);
  background:rgba(20,8,3,.72);
  color:#fff7e6;
}
button{
  font-weight:900;
}
button:disabled{
  opacity:.45;
  filter:grayscale(1);
}
.timerState{
  text-align:center;
  color:#ffd27a;
  font-size:36px;
  font-weight:900;
  text-shadow:0 0 14px rgba(255,170,60,.8);
  margin-top:20px;
}
.timer{
  text-align:center;
  font-size:44px;
  letter-spacing:4px;
  font-weight:900;
  color:#fff7e8;
}
.units{
  text-align:center;
  color:#f2dcc0;
  font-size:13px;
  letter-spacing:24px;
  margin-left:20px;
}
.progress{
  height:12px;
  border-radius:999px;
  background:rgba(20,12,8,.85);
  border:1px solid rgba(255,180,90,.35);
  overflow:hidden;
  margin:14px 0 4px;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#d78b32,#ffd27a);
  transition:.3s;
}
.percent{
  text-align:center;
  color:#ffd27a;
  font-weight:900;
  margin-bottom:16px;
}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.start{
  background:linear-gradient(180deg,#d2913a,#8b4d12);
}
.reset{
  background:linear-gradient(180deg,#b82c27,#6f1210);
}
.selectBox{
  border:1px solid rgba(255,190,100,.55);
  border-radius:14px;
  padding:14px;
  background:rgba(10,4,2,.66);
}
.selectHead{
  display:flex;
  justify-content:space-between;
  color:#ffd27a;
  font-weight:900;
  margin-bottom:10px;
}
.addRow{
  display:grid;
  grid-template-columns:1fr 92px;
  gap:10px;
}
.add{
  background:linear-gradient(180deg,#d2913a,#8b4d12);
}
.selected{
  margin-top:12px;
  min-height:150px;
  border:1px solid rgba(255,190,100,.35);
  border-radius:12px;
  background:rgba(10,4,2,.58);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  padding:12px;
  color:#f3ddbd;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid rgba(255,205,140,.55);
  border-radius:999px;
  padding:8px 12px;
  margin:5px;
  background:rgba(255,184,95,.13);
}
.pill button{
  width:auto;
  padding:2px 8px;
  margin:0;
  border-radius:999px;
  background:#9b201c;
}
.toast{
  position:fixed;
  top:16px;
  left:12px;
  right:12px;
  background:#5c3214;
  border:1px solid #ffd27a;
  border-radius:14px;
  padding:14px;
  text-align:center;
  font-weight:900;
  display:none;
  z-index:20;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:30;
  padding:20px;
}
.modalBox{
  width:320px;
  background:#2a1307;
  border:2px solid #ffd27a;
  border-radius:22px;
  padding:20px;
  text-align:center;
}
.modalTitle{
  font-size:22px;
  font-weight:900;
  color:#ffd27a;
  margin-bottom:12px;
}
.modalActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}
.note{
  text-align:center;
  color:#ffd27a;
  font-size:13px;
  margin:18px 0;
}
@media(max-width:720px){
  h1{font-size:34px}
  .row{grid-template-columns:1fr}
  .timer{font-size:40px}
  .selected{min-height:120px}
}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="confirmModal" class="modal">
  <div class="modalBox">
    <div class="modalTitle">本当にリセットしますか？</div>
    <div>この繁殖場のタイマーが未セットに戻ります。</div>
    <div class="modalActions">
      <button class="reset" id="confirmYes">はい</button>
      <button class="start" id="confirmNo">いいえ</button>
    </div>
  </div>
</div>
<div class="app">
<h1>
  <span>oncehuman</span>
  <span>動物繁殖タイマー</span>
</h1>
<div class="line"></div>
<div class="sub">24時間後に繁殖準備完了</div>
<div id="areas"></div>
<div class="note">※ タイマーは24時間固定です。ブラウザを閉じても時間は保持されます。</div>
</div>
<script>
const DAY=24*60*60*1000;
const KEY="oncehuman_animal_breeding_timer_final_photo";

const animals=[
["オオカミ","🐺"],["ヒョウ","🐆"],["クマ","🐻"],["ホッキョクグマ","🐻‍❄️"],
["イノシシ","🐗"],["バッファロー","🦬"],["シカ","🦌"],["ヒツジ","🐑"],
["ウサギ","🐰"],["カピバラ","🦫"],["キツネ","🦊"],["スノーフォックス","❄️🦊"],
["フラミンゴ","🦩"],["ワニ","🐊"],["ワニガメ","🐢"],["ウミガメ","🌊🐢"]
];

const bgImgs=["IMG_5897.jpeg","IMG_5904.jpeg","IMG_5899.jpeg"];

let data=JSON.parse(localStorage.getItem(KEY)||"null")||[
{name:"",start:null,done:false,selected:[]},
{name:"",start:null,done:false,selected:[]},
{name:"",start:null,done:false,selected:[]}
];

let resetTarget=null;

function save(){
  localStorage.setItem(KEY,JSON.stringify(data));
}

function fmt(ms){
  if(ms<=0)return"00:00:00";
  let s=Math.floor(ms/1000);
  let h=Math.floor(s/3600);
  let m=Math.floor((s%3600)/60);
  let sec=s%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}

function icon(name){
  let a=animals.find(x=>x[0]===name);
  return a?a[1]:"🐾";
}

function beep(){
  try{
    let c=new AudioContext();
    let o=c.createOscillator();
    let g=c.createGain();
    o.connect(g);
    g.connect(c.destination);
    o.frequency.value=880;
    g.gain.value=.09;
    o.start();
    setTimeout(()=>{o.stop();c.close()},800);
    if(navigator.vibrate)navigator.vibrate([300,120,300]);
  }catch(e){}
}

function toastMsg(t){
  toast.textContent=t;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",5000);
}

function isRunning(i){
  return data[i].start && data[i].start+DAY-Date.now()>0;
}

function startTimer(i){
  data[i].start=Date.now();
  data[i].done=false;
  save();
  updateTimers();
}

function askReset(i){
  resetTarget=i;
  confirmModal.style.display="flex";
}

function closeConfirm(){
  confirmModal.style.display="none";
  resetTarget=null;
}

function doReset(){
  if(resetTarget===null)return;
  data[resetTarget].start=null;
  data[resetTarget].done=false;
  save();
  closeConfirm();
  updateTimers();
}

confirmYes.onclick=doReset;
confirmNo.onclick=closeConfirm;

function setName(i,v){
  data[i].name=v;
  save();
}

function addAnimal(i){
  let sel=document.getElementById("animal"+i);
  let val=sel.value;
  if(!val)return;
  if(data[i].selected.length>=5){
    alert("1つの繁殖場につき5匹までです");
    return;
  }
  data[i].selected.push(val);
  sel.value="";
  save();
  renderSelected(i);
}

function removeAnimal(i,index){
  data[i].selected.splice(index,1);
  save();
  renderSelected(i);
}

function renderSelected(i){
  let box=document.getElementById("selected"+i);
  let count=document.getElementById("count"+i);
  count.textContent=data[i].selected.length+" / 5";
  box.innerHTML=data[i].selected.length
    ?data[i].selected.map((n,idx)=>`<span class="pill">${icon(n)} ${n}<button onclick="removeAnimal(${i},${idx})">×</button></span>`).join("")
    :"選択された動物はありません";
}

function build(){
  areas.innerHTML="";
  data.forEach((a,i)=>{
    let opts='<option value="">動物を選択してください</option>'+
      animals.map(x=>`<option value="${x[0]}">${x[1]} ${x[0]}</option>`).join("");

    let div=document.createElement("div");
    div.className="area";
    div.style.setProperty("--bg",`url("${bgImgs[i]}")`);

    div.innerHTML=`
      <div class="badges">
        <span class="place">繁殖場${i+1}</span>
        <span id="status${i}" class="status">未開始</span>
      </div>

      <div class="row">
        <div>
          <label class="title">テイマー名</label>
          <input value="${a.name}" oninput="setName(${i},this.value)" placeholder="テイマー名を入力してください">

          <div class="timerState" id="state${i}">未セット</div>
          <div class="timer" id="timer${i}">24:00:00</div>
          <div class="units">時 分 秒</div>

          <div class="progress">
            <div id="bar${i}" class="bar"></div>
          </div>
          <div id="percent${i}" class="percent">0%</div>

          <div class="actions">
            <button id="start${i}" class="start" onclick="startTimer(${i})">▶ 24時間タイマー開始</button>
            <button id="reset${i}" class="reset" onclick="askReset(${i})">↻ リセット</button>
          </div>
        </div>

        <div class="selectBox">
          <div class="selectHead">
            <span>動物を選択（最大5匹まで）</span>
            <span id="count${i}">0 / 5</span>
          </div>
          <div class="addRow">
            <select id="animal${i}">${opts}</select>
            <button id="add${i}" class="add" onclick="addAnimal(${i})">追加</button>
          </div>
          <div id="selected${i}" class="selected">選択された動物はありません</div>
        </div>
      </div>
    `;

    areas.appendChild(div);
    renderSelected(i);
  });
  updateTimers();
}

function updateTimers(){
  data.forEach((a,i)=>{
    let left=a.start?a.start+DAY-Date.now():DAY;
    let pct=a.start?Math.max(0,Math.min(100,left/DAY*100)):0;
    let ready=a.start&&left<=0;
    let running=isRunning(i);

    document.getElementById("timer"+i).textContent=ready?"00:00:00":fmt(left);
    document.getElementById("bar"+i).style.width=pct+"%";
    document.getElementById("percent"+i).textContent=Math.round(100-pct)+"%";

    document.getElementById("start"+i).disabled=running||ready;
    document.getElementById("reset"+i).disabled=!a.start;
    document.getElementById("animal"+i).disabled=running||ready;
    document.getElementById("add"+i).disabled=running||ready;

    let status=document.getElementById("status"+i);
    let state=document.getElementById("state"+i);

    if(ready){
      status.textContent="準備完了";
      status.className="status ready";
      state.textContent="準備完了";
      if(!a.done){
        a.done=true;
        beep();
        toastMsg(`繁殖場${i+1}の繁殖準備が完了しました！`);
        save();
      }
    }else if(running){
      status.textContent="繁殖中";
      status.className="status active";
      state.textContent="繁殖中";
    }else{
      status.textContent="未開始";
      status.className="status";
      state.textContent="未セット";
    }
  });
}

build();
setInterval(updateTimers,1000);
</script>
</body>
</html>
