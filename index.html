<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>oncehuman動物繁殖タイマー</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#160f0a;color:#fff4dc;min-height:100vh}
body:before{content:"";position:fixed;inset:0;background:linear-gradient(rgba(34,18,8,.45),rgba(12,6,3,.94)),url("C6B5C7E6-C0A5-4D30-9AB6-24B33C4FDD14.png") center/cover no-repeat;z-index:-2}
.app{max-width:760px;margin:auto;padding:22px 12px 80px}
h1{text-align:center;color:#ffd58a;font-size:34px;margin:10px 0 4px;text-shadow:0 0 18px rgba(255,170,70,.65)}
.sub{text-align:center;color:#ffe6bd;margin-bottom:18px;font-weight:800}
.line{height:1px;background:linear-gradient(90deg,transparent,#e0a34d,transparent);margin:8px 20px 14px}
.area{position:relative;overflow:hidden;border:1px solid rgba(255,180,90,.75);border-radius:22px;padding:16px;margin:16px 0;background:linear-gradient(180deg,rgba(64,35,17,.84),rgba(20,10,5,.88));box-shadow:0 0 24px rgba(255,150,60,.16)}
.area:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(60,30,12,.2),rgba(15,7,3,.9)),var(--bg) center/cover no-repeat;opacity:.70;z-index:0}
.area>*{position:relative;z-index:1}
.badges{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.place{border:1px solid #ffcf8a;color:#fff1c7;background:rgba(135,75,28,.58);border-radius:12px;padding:6px 13px;font-weight:900;font-size:20px}
.status{border:1px solid #ff826d;background:#8d251c;border-radius:999px;padding:6px 14px;font-weight:900;color:#fff}
.status.ready{background:#4f8a45;border-color:#b8f59b}
.status.active{background:#b56f1f;border-color:#ffd58a}
label.title{display:block;color:#ffd58a;font-weight:900;margin:10px 0 6px}
input,select,button{width:100%;font-size:16px;border-radius:12px;padding:12px;border:1px solid rgba(255,205,140,.65);background:rgba(36,19,9,.78);color:#fff4dc}
button:disabled{opacity:.45;filter:grayscale(1)}
.nameBox{margin-bottom:12px}
.selectBox{border:1px solid rgba(255,205,140,.45);border-radius:16px;padding:12px;background:rgba(30,15,7,.58);margin:12px 0}
.selectHead{display:flex;justify-content:space-between;color:#ffd58a;font-weight:900;margin-bottom:8px}
.addRow{display:grid;grid-template-columns:1fr 92px;gap:8px}
button.add{background:linear-gradient(180deg,#c88b40,#7a4418)}
.selected{margin-top:8px;border:1px solid rgba(255,255,255,.18);border-radius:12px;min-height:44px;padding:9px;color:#f3ddbd;text-align:center;background:rgba(18,8,4,.55)}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,205,140,.55);border-radius:999px;padding:6px 10px;margin:4px;background:rgba(255,184,95,.12)}
.pill button{width:auto;padding:2px 7px;margin:0;border-radius:999px;background:#8d251c}
.timerPanel{border:1px solid rgba(255,205,140,.35);border-radius:18px;padding:14px;background:rgba(20,9,4,.55);margin-top:12px}
.timerBox{text-align:center}
.timerState{font-size:34px;color:#ffd58a;font-weight:900;text-shadow:0 0 12px rgba(255,175,75,.65)}
.timer{font-size:42px;letter-spacing:3px;font-weight:900;color:#fff7e6;margin:4px 0}
.units{font-size:13px;color:#f3ddbd;letter-spacing:26px;margin-left:22px}
.progress{height:14px;background:#2b211a;border-radius:999px;overflow:hidden;border:1px solid #4d3422;margin:12px 0 2px}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#d0893f,#ffd58a);transition:.3s}
.percent{text-align:center;color:#ffd58a;font-weight:900;margin-bottom:10px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0 4px}
button.start{background:linear-gradient(180deg,#d69b4c,#8a501f);border-color:#ffd58a}
button.reset{background:linear-gradient(180deg,#b54632,#6f1d16);border-color:#ff9272}
.toast{position:fixed;top:16px;left:12px;right:12px;background:#6c3d1b;border:1px solid #ffd58a;border-radius:14px;padding:14px;text-align:center;font-weight:900;display:none;z-index:20;color:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:30;padding:20px}
.modalBox{width:320px;background:#2b1609;border:2px solid #ffd58a;border-radius:22px;padding:20px;text-align:center;box-shadow:0 0 25px rgba(255,190,90,.45)}
.modalTitle{font-size:22px;font-weight:900;color:#ffd58a;margin-bottom:12px}
.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.note{text-align:center;color:#ffd58a;font-size:13px;margin:18px 0}
@media(max-width:620px){.timer{font-size:38px}.units{letter-spacing:20px}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="confirmModal" class="modal">
  <div class="modalBox">
    <div class="modalTitle">本当にリセットしますか？</div>
    <div>リセットすると、この繁殖場のタイマーが未セットに戻ります。</div>
    <div class="modalActions">
      <button class="reset" id="confirmYes">はい</button>
      <button class="start" id="confirmNo">いいえ</button>
    </div>
  </div>
</div>
<div class="app">
<h1>oncehuman動物繁殖タイマー</h1>
<div class="line"></div>
<div class="sub">24時間後に繁殖準備完了</div>
<div id="areas"></div>
<div class="note">※ タイマーは24時間固定です。ブラウザを閉じても時間は保持されます。</div>
</div>
<script>
const DAY=24*60*60*1000;
const KEY="oncehuman_animal_breeding_timer_v3";
const animals=[
["オオカミ","🐺"],["ヒョウ","🐆"],["クマ","🐻"],["ホッキョクグマ","🐻‍❄️"],
["イノシシ","🐗"],["バッファロー","🦬"],["シカ","🦌"],["ヒツジ","🐑"],
["ウサギ","🐰"],["カピバラ","🦫"],["キツネ","🦊"],["スノーフォックス","❄️🦊"],
["フラミンゴ","🦩"],["ワニ","🐊"],["ワニガメ","🐢"],["ウミガメ","🌊🐢"]
];
const bgImgs=["IMG_5849.png","IMG_5850.png","IMG_5852.png"];
let data=JSON.parse(localStorage.getItem(KEY)||"null")||[
{name:"",start:null,done:false,selected:[]},
{name:"",start:null,done:false,selected:[]},
{name:"",start:null,done:false,selected:[]}
];
let resetTarget=null;
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function fmt(ms){if(ms<=0)return"00:00:00";let s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`}
function icon(name){let a=animals.find(x=>x[0]===name);return a?a[1]:"🐾"}
function beep(){try{let c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.09;o.start();setTimeout(()=>{o.stop();c.close()},800);if(navigator.vibrate)navigator.vibrate([300,120,300])}catch(e){}}
function toastMsg(t){toast.textContent=t;toast.style.display="block";setTimeout(()=>toast.style.display="none",5000)}
function isRunning(i){
if(!data[i].start)return false;
return data[i].start+DAY-Date.now()>0;
}
function startTimer(i){
data[i].start=Date.now();
data[i].done=false;
save();
updateTimers();
}
function askReset(i){
resetTarget=i;
confirmModal.style.display="flex";
}
function closeConfirm(){
confirmModal.style.display="none";
resetTarget=null;
}
function doReset(){
if(resetTarget===null)return;
data[resetTarget].start=null;
data[resetTarget].done=false;
save();
closeConfirm();
updateTimers();
}
confirmYes.onclick=doReset;
confirmNo.onclick=closeConfirm;
function setName(i,v){data[i].name=v;save()}
function addAnimal(i){
let sel=document.getElementById("animal"+i);
let val=sel.value;
if(!val)return;
if(data[i].selected.length>=5){alert("1つの繁殖場につき5匹までです");return}
data[i].selected.push(val);
sel.value="";
save();
renderSelected(i);
}
function removeAnimal(i,index){
data[i].selected.splice(index,1);
save();
renderSelected(i);
}
function renderSelected(i){
let box=document.getElementById("selected"+i);
let count=document.getElementById("count"+i);
count.textContent=data[i].selected.length+" / 5";
box.innerHTML=data[i].selected.length
?data[i].selected.map((n,idx)=>`<span class="pill">${icon(n)} ${n}<button onclick="removeAnimal(${i},${idx})">×</button></span>`).join("")
:"選択された動物はありません";
}
function build(){
areas.innerHTML="";
data.forEach((a,i)=>{
let opts='<option value="">動物を選択してください</option>'+animals.map(x=>`<option value="${x[0]}">${x[1]} ${x[0]}</option>`).join("");
let div=document.createElement("div");
div.className="area";
div.style.setProperty("--bg",`url("${bgImgs[i]}")`);
div.innerHTML=`
<div class="badges">
<span class="place">繁殖場${i+1}</span>
<span id="status${i}" class="status">未開始</span>
</div>
<div class="nameBox">
<label class="title">テイマー名</label>
<input value="${a.name}" oninput="setName(${i},this.value)" placeholder="テイマー名を入力してください">
</div>
<div class="selectBox">
<div class="selectHead"><span>動物を選択（最大5匹まで）</span><span id="count${i}">0 / 5</span></div>
<div class="addRow">
<select id="animal${i}">${opts}</select>
<button id="add${i}" class="add" onclick="addAnimal(${i})">追加</button>
</div>
<div id="selected${i}" class="selected">選択された動物はありません</div>
</div>
<div class="timerPanel">
<div class="timerBox">
<div id="state${i}" class="timerState">未セット</div>
<div id="timer${i}" class="timer">24:00:00</div>
<div class="units">時 分 秒</div>
<div class="progress"><div id="bar${i}" class="bar"></div></div>
<div id="percent${i}" class="percent">0%</div>
</div>
<div class="actions">
<button id="start${i}" class="start" onclick="startTimer(${i})">▶ 24時間タイマー開始</button>
<button id="reset${i}" class="reset" onclick="askReset(${i})">↻ リセット</button>
</div>
</div>
`;
areas.appendChild(div);
renderSelected(i);
});
updateTimers();
}
function updateTimers(){
data.forEach((a,i)=>{
let left=a.start?a.start+DAY-Date.now():DAY;
let pct=a.start?Math.max(0,Math.min(100,left/DAY*100)):0;
let ready=a.start&&left<=0;
let running=isRunning(i);
document.getElementById("timer"+i).textContent=ready?"00:00:00":fmt(left);
document.getElementById("bar"+i).style.width=pct+"%";
document.getElementById("percent"+i).textContent=Math.round(100-pct)+"%";
document.getElementById("start"+i).disabled=running||ready;
document.getElementById("reset"+i).disabled=!a.start;
document.getElementById("animal"+i).disabled=running||ready;
document.getElementById("add"+i).disabled=running||ready;
let status=document.getElementById("status"+i);
let state=document.getElementById("state"+i);
if(ready){
status.textContent="準備完了";
status.className="status ready";
state.textContent="準備完了";
if(!a.done){a.done=true;beep();toastMsg(`繁殖場${i+1}の繁殖準備が完了しました！`);save()}
}else if(running){
status.textContent="繁殖中";
status.className="status active";
state.textContent="繁殖中";
}else{
status.textContent="未開始";
status.className="status";
state.textContent="未セット";
}
});
}
build();
setInterval(updateTimers,1000);
</script>
</body>
</html>
